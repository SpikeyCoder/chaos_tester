name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore: ['frontend/**', '*.md', 'LICENSE']
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE: chaos-tester
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Refresh CSP inline-style hashes
        # WA-2026-05-05-02 phase 4 — every Cloud Run deploy re-runs
        # compute_style_hashes.py against the templates that ship in
        # the same revision. The result is committed into the deploy
        # image so the Content-Security-Policy-Report-Only header in
        # app.py exactly matches the inline-style attributes that
        # actually render. We --check first; if the committed file is
        # out of date relative to templates/, the build fails fast and
        # the dev re-runs the script locally.
        run: |
          python3 scripts/compute_style_hashes.py --check

      - name: Check CSP header byte budget
        # GFE silently strips response headers whose value exceeds
        # ~8,192 bytes. The Content-Security-Policy-Report-Only header
        # is the binding constraint because every inline `style="..."`
        # attribute on the site contributes a sha256 token to its
        # `style-src-attr 'unsafe-hashes'` allowlist. This step fails
        # the build if the reconstructed header would exceed our
        # configured budget (8,000 bytes default, leaving ~192 bytes
        # of safety margin under the 8,192-byte GFE hard limit).
        # See compliance/inline-style-audit-2026-05-05.md.
        run: |
          python3 scripts/check_csp_header_size.py

      - name: Bust Docker cache
        run: |
          sed -i "s/^ARG CACHE_BUST=.*/ARG CACHE_BUST=$(date +%s)/" Dockerfile

      - name: Seed secrets into Secret Manager (idempotent)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PSI_API_KEY: ${{ secrets.GOOGLE_PSI_API_KEY }}
          WA_SHARED_SECRET: ${{ secrets.WA_SHARED_SECRET }}
          CHAOS_TESTER_SECRET_KEY: ${{ secrets.CHAOS_TESTER_SECRET_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          declare -A SECRETS=(
            [chaos-tester-supabase-service-key]="$SUPABASE_SERVICE_KEY"
            [chaos-tester-perplexity-api-key]="$PERPLEXITY_API_KEY"
            [chaos-tester-google-places-api-key]="$GOOGLE_PLACES_API_KEY"
            [chaos-tester-google-psi-api-key]="$GOOGLE_PSI_API_KEY"
            [chaos-tester-wa-shared-secret]="$WA_SHARED_SECRET"
            [chaos-tester-flask-secret-key]="$CHAOS_TESTER_SECRET_KEY"
            [chaos-tester-trello-api-key]="$TRELLO_API_KEY"
            [chaos-tester-trello-token]="$TRELLO_TOKEN"
            [chaos-tester-trello-list-id]="$TRELLO_LIST_ID"
            [chaos-tester-supabase-anon-key]="$SUPABASE_ANON_KEY"
          )
          for name in "${!SECRETS[@]}"; do
            if ! gcloud secrets describe "$name" --project=${{ env.PROJECT_ID }} >/dev/null 2>&1; then
              echo "Creating secret: $name"
              printf '%s' "${SECRETS[$name]}" | gcloud secrets create "$name" --data-file=- --project=${{ env.PROJECT_ID }}
            else
              echo "Secret $name exists — adding new version"
              printf '%s' "${SECRETS[$name]}" | gcloud secrets versions add "$name" --data-file=- --project=${{ env.PROJECT_ID }}
            fi
          done

      - name: Clear old env vars and secret refs (one-time migration cleanup)
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --remove-env-vars "SUPABASE_SERVICE_KEY,PERPLEXITY_API_KEY,GOOGLE_PLACES_API_KEY,GOOGLE_PSI_API_KEY,WA_SHARED_SECRET,CHAOS_TESTER_SECRET_KEY,TRELLO_API_KEY,TRELLO_TOKEN,TRELLO_LIST_ID,SUPABASE_ANON_KEY" \
            --quiet 2>/dev/null || true
          gcloud run services update ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --remove-secrets "SUPABASE_SERVICE_KEY,PERPLEXITY_API_KEY,GOOGLE_PLACES_API_KEY,GOOGLE_PSI_API_KEY,WA_SHARED_SECRET,CHAOS_TESTER_SECRET_KEY,TRELLO_API_KEY,TRELLO_TOKEN,TRELLO_LIST_ID,SUPABASE_ANON_KEY" \
            --quiet 2>/dev/null || true

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-secrets "SUPABASE_SERVICE_KEY=chaos-tester-supabase-service-key:latest,PERPLEXITY_API_KEY=chaos-tester-perplexity-api-key:latest,GOOGLE_PLACES_API_KEY=chaos-tester-google-places-api-key:latest,GOOGLE_PSI_API_KEY=chaos-tester-google-psi-api-key:latest,WA_SHARED_SECRET=chaos-tester-wa-shared-secret:latest,CHAOS_TESTER_SECRET_KEY=chaos-tester-flask-secret-key:latest,TRELLO_API_KEY=chaos-tester-trello-api-key:latest,TRELLO_TOKEN=chaos-tester-trello-token:latest,TRELLO_LIST_ID=chaos-tester-trello-list-id:latest,SUPABASE_ANON_KEY=chaos-tester-supabase-anon-key:latest" \
            --quiet

      - name: Set CORS allowed origins
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --update-env-vars "^@^CORS_ALLOWED_ORIGINS=https://website-auditor.io,https://spikeycoder.github.io" \
            --quiet
