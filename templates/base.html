<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
<title>{% block title %}Chaos Tester{% endblock %}</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e4e6f0;
  --text-muted: #8b8fa3;
  --accent: #f97316;
  --accent-dim: #c2410c;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --blue: #3b82f6;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* ── Header ─────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  position: sticky; top: 0; z-index: 100;
}
header .inner {
  display: flex; align-items: center; justify-content: space-between;
}
header h1 {
  font-size: 1.25rem; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
header h1 .monkey { font-size: 1.5rem; }
header nav { display: flex; gap: 20px; }
header nav a {
  color: var(--text-muted); font-size: 0.9rem; font-weight: 500;
  transition: color 0.15s;
}
header nav a:hover { color: var(--accent); text-decoration: none; }

/* ── Cards ──────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}
.card h2 {
  font-size: 1.1rem; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

/* ── Forms ──────────────────────────────────────────── */
label {
  display: block; font-size: 0.85rem; color: var(--text-muted);
  margin-bottom: 6px; font-weight: 500;
}
input[type="text"], input[type="number"], input[type="url"],
select, textarea {
  width: 100%; padding: 10px 14px;
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; font-family: var(--font);
  transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent);
}
textarea { resize: vertical; min-height: 70px; }

.form-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-bottom: 16px;
}
.form-group { margin-bottom: 16px; }

.checkbox-row {
  display: flex; flex-wrap: wrap; gap: 16px; margin: 16px 0;
}
.checkbox-row label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.9rem; color: var(--text); cursor: pointer;
  background: var(--surface2); padding: 8px 14px;
  border-radius: 8px; border: 1px solid var(--border);
  transition: border-color 0.15s;
}
.checkbox-row label:hover { border-color: var(--accent); }
.checkbox-row input[type="checkbox"] { accent-color: var(--accent); }

/* ── Buttons ────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border: none; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: all 0.15s; font-family: var(--font);
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { background: var(--accent-dim); }
.btn-secondary {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); }
.btn-danger {
  background: #7f1d1d; color: #fca5a5;
}

/* ── Badges ─────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 6px; font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-passed  { background: #14532d; color: var(--green); }
.badge-failed  { background: #7f1d1d; color: var(--red); }
.badge-warning { background: #713f12; color: var(--yellow); }
.badge-error   { background: #7f1d1d; color: var(--red); }
.badge-info    { background: #1e3a5f; color: var(--blue); }
.badge-critical{ background: #7f1d1d; color: #fca5a5; }
.badge-high    { background: #7f1d1d; color: var(--red); }
.badge-medium  { background: #713f12; color: var(--yellow); }
.badge-low     { background: #1e3a5f; color: var(--cyan); }
.badge-skipped { background: var(--surface2); color: var(--text-muted); }

/* ── Tables ─────────────────────────────────────────── */
table {
  width: 100%; border-collapse: collapse; font-size: 0.88rem;
}
th, td {
  padding: 10px 14px; text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  font-weight: 600; color: var(--text-muted);
  font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 0.04em;
}
tr:hover { background: var(--surface2); }

/* ── Progress ───────────────────────────────────────── */
.progress-bar-bg {
  width: 100%; height: 10px; background: var(--surface2);
  border-radius: 5px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 5px; transition: width 0.4s ease;
}

/* ── Stats Grid ─────────────────────────────────────── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface2); border-radius: 10px; padding: 18px;
  text-align: center;
}
.stat-card .number {
  font-size: 2rem; font-weight: 700; line-height: 1.2;
}
.stat-card .label {
  font-size: 0.8rem; color: var(--text-muted);
  text-transform: uppercase; margin-top: 4px;
}

/* ── Utility ────────────────────────────────────────── */
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mt-3 { margin-top: 24px; }
.mb-2 { margin-bottom: 16px; }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 0.85rem; }
.mono { font-family: var(--mono); }
.hidden { display: none; }

/* ── Responsive ─────────────────────────────────────── */
@media (max-width: 768px) {
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <div class="container inner">
      <h1><span class="monkey">🐵</span> Chaos Tester</h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/latest">Latest Report</a>
        <a href="/api/status">API Status</a>
      </nav>
    </div>
  </header>
  <main class="container" style="padding-top: 28px; padding-bottom: 48px;">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
