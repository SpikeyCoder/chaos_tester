{% extends "base.html" %}
{% block title %}Website Auditor — Running{% endblock %}

{% block content %}
<div class="card">
  <h2>🤖 Test Run in Progress</h2>

  <div class="progress-bar-bg mt-2">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>

  <div class="mt-2" style="display:flex;justify-content:space-between;align-items:center;">
    <span id="progressText" class="text-muted text-sm">Starting…</span>
    <span id="progressPct" style="font-size:1.5rem;font-weight:700;color:var(--accent);">0%</span>
  </div>

  <div class="mt-3" id="logBox"
       style="background:var(--surface2);border-radius:8px;padding:16px;max-height:400px;overflow-y:auto;font-family:var(--mono);font-size:0.82rem;line-height:1.8;">
  </div>

  <div class="mt-2" id="doneActions" class="hidden">
    <a href="#" class="btn btn-primary" id="viewReportBtn" style="display:none;">📊 View Report</a>
    <a href="/" class="btn btn-secondary" style="margin-left:8px;">← Dashboard</a>
  </div>
</div>

<script>
const bar = document.getElementById('progressBar');
const pct = document.getElementById('progressPct');
const txt = document.getElementById('progressText');
const log = document.getElementById('logBox');
const reportBtn = document.getElementById('viewReportBtn');

const moduleColors = {
  availability: '#3b82f6',
  links: '#a855f7',
  forms: '#06b6d4',
  chaos: '#f97316',
  auth: '#eab308',
  security: '#ef4444',
  runner: '#22c55e',
  done: '#22c55e',
};

const source = new EventSource('/stream');
source.onmessage = function(event) {
  const data = JSON.parse(event.data);
  const color = moduleColors[data.module] || '#8b8fa3';

  bar.style.width = data.pct + '%';
  pct.textContent = data.pct + '%';
  txt.textContent = data.msg;

  const line = document.createElement('div');

  const modSpan = document.createElement('span');
  modSpan.style.cssText = 'color:' + color + ';font-weight:600;';
  modSpan.textContent = '[' + data.module + ']';

  const tsSpan = document.createElement('span');
  tsSpan.style.color = 'var(--text-muted)';
  tsSpan.textContent = ' ' + (data.ts ? data.ts.substring(11, 19) : '') + ' ';

  const msgSpan = document.createElement('span');
  msgSpan.textContent = data.msg;

  line.appendChild(modSpan);
  line.appendChild(tsSpan);
  line.appendChild(msgSpan);
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;

  if (data.module === 'done') {
    source.close();
    reportBtn.style.display = 'inline-flex';
      if (data.run_id) { reportBtn.href = '/report/' + data.run_id; }
    pct.style.color = data.msg === 'completed' ? 'var(--green)' : 'var(--red)';
    txt.textContent = data.msg === 'completed' ? 'All tests complete!' : 'Run failed — see logs.';
  }
};

source.onerror = function() {
  source.close();
  txt.textContent = 'Connection lost. Refresh to check status.';
};
</script>
{% endblock %}
